[build]
  command = "npm run build"
  publish = "public"

[build.environment]
  NODE_VERSION = "20"

# Defina no painel Netlify: GATSBY_SANITY_PROJECT_ID, GATSBY_SANITY_DATASET, SANITY_READ_TOKEN (se necessário)
# Webhook no Sanity: disparar build na URL de build hook da Netlify ao publicar conteúdo

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
